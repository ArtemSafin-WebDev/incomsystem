    - generic [ref=e73]:
      - generic [ref=e74]:
        - paragraph [ref=e75]: Компания
        - heading "Начиная с 1991 года специалистами Центра внедрены сотни информационно-управляющих систем, обеспечивающих автоматизированное управление и противоаварийную защиту на предприятиях нефтегазодобычи и нефтехимии" [level=2] [ref=e76]
      - list [ref=e78]:
        - listitem [ref=e79]:
          - article [ref=e80]:
            - heading "Более 30 лет опыта в ключевых отраслях" [level=3] [ref=e82]
            - paragraph [ref=e83]: Мы обладаем богатым опытом, накопленным более чем за 30 лет работы в различных отраслях промышленности, включая энергетику, нефтехимию и другие стратегически важные секторы.
        - listitem [ref=e84]:
          - article [ref=e85]:
            - heading "Экспертиза в международных проектах" [level=3] [ref=e87]
            - paragraph [ref=e88]: Успешно реализуем проекты, соответствующие строгим международным стандартам, обеспечивая надежность и безопасность наших решений в глобальном масштабе.
        - listitem [ref=e89]:
          - article [ref=e90]:
            - heading "Решаем сложные задачи комплексно" [level=3] [ref=e92]
            - paragraph [ref=e93]: Наша команда профессионалов способна разрабатывать инновационные решения для задач любой сложности, предлагая комплексный подход, от проектирования до внедрения.
        - listitem [ref=e94]:
          - article [ref=e95]:
            - heading "Собственное производство высокотехнологичного оборудования" [level=3] [ref=e97]
            - paragraph [ref=e98]: Инвестируя в развитие, мы создали собственные производственные мощности для выпуска передовых контроллеров и вычислителей АБАК, гарантируя качество и контроль на каждом этапе.
        - listitem [ref=e99]:
          - article [ref=e100]:
            - heading "Автоматизация и реконструкция под ключ" [level=3] [ref=e102]
            - paragraph [ref=e103]: Обладаем уникальным опытом реконструкции устаревших систем автоматизации, внедряя современные решения для повышения эффективности и надежности производства.
        - listitem [ref=e104]:
          - article [ref=e105]:
            - heading "Гарантия качества на всех этапах" [level=3] [ref=e107]
            - paragraph [ref=e108]: Тщательно контролируем качество на всех этапах жизненного цикла проекта, от разработки документации до создания и поставки оборудования, обеспечивая соответствие самым высоким требованиям.
        - listitem [ref=e109]:
          - article [ref=e110]:
            - heading "Полное сервисное сопровождение" [level=3] [ref=e112]
            - paragraph [ref=e113]: Предоставляем комплексное сервисное обслуживание поставленного оборудования, включая техническую поддержку, программное обеспечение и обучение специалистов заказчика.
        - listitem [ref=e114]:
          - article [ref=e115]:
            - heading "Надежный партнер, ориентированный на результат" [level=3] [ref=e117]
            - paragraph [ref=e118]: Мы ценим доверие наших клиентов и несем полную ответственность за свои решения, гарантируя успешное достижение поставленных целей и долгосрочное сотрудничество.
