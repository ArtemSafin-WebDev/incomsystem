    - article [ref=e27]:
      - heading "Завершился финал Чемпионата по профессиональному мастерству «Профессионалы»" [level=2] [ref=e28]
      - paragraph [ref=e29]: В Санкт-Петербурге завершился финал Чемпионата по профессиональному мастерству «Профессионалы», который проходил с 26 по 30 ноября на площадке КВЦ «Экспофорум». Мероприятие впечатляет масштабами, ведь в финале встретились более 900 лучших студентов профессиональных учебных заведений со всей России, из дружественных стран, а также учащиеся старших классов, молодые специалисты, успешно прошедшие отборочные этапы на межрегиональном уровне.
      - paragraph [ref=e30]:
        - text: Участники соревнований второй год подряд выполняли задания на оборудовании ведущих российских компаний, в том числе на контроллерном оборудовании АБАК ПЛК
        - link "производства НИЦ «Инкомсистем»" [ref=e31] [cursor=pointer]:
          - /url: "#"
        - text: .
      - paragraph [ref=e32]: Компания НИЦ «Инкомсистем» выступила спонсором конкурса, обеспечив чемпионат оборудованием, технической поддержкой, а также ценными призами для участников, экспертов и победителей соревнований. 15 комплектов оборудования было использовано для отработки навыков конкурсантов в компетенции «Промышленная автоматика».
