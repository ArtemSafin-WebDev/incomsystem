<section class="career-students" aria-labelledby="career-students-title">
    <div class="container">
        <h2 class="career-students__title" id="career-students-title">{{careerStudents.title}}</h2>

        <ul class="career-students__list" aria-label="{{careerStudents.ariaLabel}}">
            {{#each careerStudents.items}}
            <li class="career-students__item">
                <article class="career-students-card">
                    {{#if mediaFirst}}
                    <div class="career-students-card__media">
                        <img class="career-students-card__image" src="{{image}}" alt="{{imageAlt}}" loading="lazy">
                    </div>
                    {{/if}}

                    <div class="career-students-card__content">
                        <div class="career-students-card__heading">
                            <p class="career-students-card__index">{{index}}</p>
                            <h3 class="career-students-card__title">{{{title}}}</h3>
                        </div>
                        <p class="career-students-card__description">{{{text}}}</p>
                    </div>

                    {{#unless mediaFirst}}
                    <div class="career-students-card__media">
                        <img class="career-students-card__image" src="{{image}}" alt="{{imageAlt}}" loading="lazy">
                    </div>
                    {{/unless}}
                </article>
            </li>
            {{/each}}
        </ul>

        <a class="career-students__btn btn" href="{{careerStudents.buttonHref}}">
            {{careerStudents.buttonText}}
        </a>
    </div>
</section>
