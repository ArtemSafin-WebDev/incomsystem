<a class="company-review-card" href="{{item.href}}">
    <div class="company-review-card__company">
        <p class="company-review-card__company-name">{{item.company}}</p>

        <div class="company-review-card__logo">
            <img class="company-review-card__logo-image" src="{{item.logo}}" alt="">
        </div>
    </div>

    <div class="company-review-card__media">
        <img class="company-review-card__image" src="{{item.image}}" alt="{{item.imageAlt}}">
    </div>
</a>
