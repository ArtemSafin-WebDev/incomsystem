<article class="product-category-card">
    <a class="product-category-card__image-link" href="{{item.href}}" aria-label="{{item.title}}">
        <img class="product-category-card__image" src="{{item.image}}" alt="{{item.imageAlt}}" loading="lazy">
    </a>

    <div class="product-category-card__content">
        <h3 class="product-category-card__title">{{item.title}}</h3>

        <a class="product-category-card__button" href="{{item.href}}">
            <span>{{detailsText}}</span>
            <span class="product-category-card__button-arrow" aria-hidden="true">→</span>
        </a>
    </div>
</article>
