<article class="engineering-doc-card">
    <div class="engineering-doc-card__body">
        <div class="engineering-doc-card__top">
            <h3 class="engineering-doc-card__title">{{doc.title}}</h3>
            <p class="engineering-doc-card__meta">
                <span>{{doc.type}}</span>
                <span>·</span>
                <span>{{doc.size}}</span>
            </p>
        </div>

        <a class="engineering-doc-card__download" href="{{doc.href}}">{{doc.downloadText}}</a>
    </div>

    <span class="engineering-doc-card__icon" aria-hidden="true">
        <svg width="60" height="60">
            <use xlink:href="#pdf"></use>
        </svg>
    </span>
</article>
