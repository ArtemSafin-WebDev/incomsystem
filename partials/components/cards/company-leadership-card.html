<article class="company-leadership-card">
    <div class="company-leadership-card__media">
        <img class="company-leadership-card__image" src="{{item.image}}" alt="{{item.imageAlt}}">
    </div>

    <div class="company-leadership-card__content">
        <h3 class="company-leadership-card__name">{{item.name}}</h3>
        <p class="company-leadership-card__position">{{item.position}}</p>
    </div>
</article>
