    - generic [ref=e48]:
      - generic [ref=e49]:
        - paragraph [ref=e50]: Компания
        - heading "Начиная с 1991 года специалистами Центра внедрены сотни информационно-управляющих систем, обеспечивающих автоматизированное управление и противоаварийную защиту на предприятиях нефтегазодобычи и нефтехимии" [level=2] [ref=e51]
      - list [ref=e53]:
        - listitem [ref=e54]:
          - article [ref=e55]:
            - heading "Более 30 лет опыта в ключевых отраслях" [level=3] [ref=e56]
            - paragraph [ref=e57]: Мы обладаем богатым опытом, накопленным более чем за 30 лет работы в различных отраслях промышленности, включая энергетику, нефтехимию и другие стратегически важные секторы.
        - listitem [ref=e58]:
          - article [ref=e59]:
            - heading "Экспертиза в международных проектах" [level=3] [ref=e60]
            - paragraph [ref=e61]: Успешно реализуем проекты, соответствующие строгим международным стандартам, обеспечивая надежность и безопасность наших решений в глобальном масштабе.
        - listitem [ref=e62]:
          - article [ref=e63]:
            - heading "Решаем сложные задачи комплексно" [level=3] [ref=e64]
            - paragraph [ref=e65]: Наша команда профессионалов способна разрабатывать инновационные решения для задач любой сложности, предлагая комплексный подход, от проектирования до внедрения.
        - listitem [ref=e66]:
          - article [ref=e67]:
            - heading "Собственное производство высокотехнологичного оборудования" [level=3] [ref=e68]
            - paragraph [ref=e69]: Инвестируя в развитие, мы создали собственные производственные мощности для выпуска передовых контроллеров и вычислителей АБАК, гарантируя качество и контроль на каждом этапе.
        - listitem [ref=e70]:
          - article [ref=e71]:
            - heading "Автоматизация и реконструкция под ключ" [level=3] [ref=e72]
            - paragraph [ref=e73]: Обладаем уникальным опытом реконструкции устаревших систем автоматизации, внедряя современные решения для повышения эффективности и надежности производства.
        - listitem [ref=e74]:
          - article [ref=e75]:
            - heading "Гарантия качества на всех этапах" [level=3] [ref=e76]
            - paragraph [ref=e77]: Тщательно контролируем качество на всех этапах жизненного цикла проекта, от разработки документации до создания и поставки оборудования, обеспечивая соответствие самым высоким требованиям.
        - listitem [ref=e78]:
          - article [ref=e79]:
            - heading "Полное сервисное сопровождение" [level=3] [ref=e80]
            - paragraph [ref=e81]: Предоставляем комплексное сервисное обслуживание поставленного оборудования, включая техническую поддержку, программное обеспечение и обучение специалистов заказчика.
        - listitem [ref=e82]:
          - article [ref=e83]:
            - heading "Надежный партнер, ориентированный на результат" [level=3] [ref=e84]
            - paragraph [ref=e85]: Мы ценим доверие наших клиентов и несем полную ответственность за свои решения, гарантируя успешное достижение поставленных целей и долгосрочное сотрудничество.
